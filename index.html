<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Sarthak Mayani — Software Engineer & Full Stack Developer. Interactive portfolio built with React and Three.js." />
  <title>SpyOS // Sarthak Mayani — Classified Access</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --green-primary: #00ff9d;
      --green-dim: #00b36b;
      --green-dark: #004d30;
      --cyan-accent: #00e5ff;
      --amber-warn: #ffc107;
      --rose-danger: #ff4560;
      --bg-deep: #020a04;
      --bg-surface: #030f06;
      --glass-low: rgba(3, 15, 6, 0.55);
      --glass-mid: rgba(0, 0, 0, 0.72);
      --glass-high: rgba(0, 0, 0, 0.85);
    }

    * {
      box-sizing: border-box;
      touch-action: manipulation;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--green-primary);
      /* Support notched / home-indicator devices */
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }

    #root {
      width: 100%;
      height: 100%;
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--green-dark);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--green-dim);
    }

    /* ── CRT scanlines overlay ── */
    .scanlines::after {
      content: '';
      display: block;
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.18) 2px,
          rgba(0, 0, 0, 0.18) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Vignette ── */
    .vignette::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.75) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Keyframes ── */
    @keyframes glitch {

      0%,
      100% {
        transform: translate(0);
        clip-path: none;
      }

      10% {
        transform: translate(-2px, 2px);
      }

      20% {
        transform: translate(2px, -2px);
        clip-path: inset(20% 0 30% 0);
      }

      30% {
        transform: translate(-1px, 1px);
        clip-path: none;
      }

      40% {
        transform: translate(1px, -1px);
      }
    }

    @keyframes scanline-sweep {
      0% {
        transform: translateY(-100%);
      }

      100% {
        transform: translateY(100vh);
      }
    }

    @keyframes data-pulse {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes text-flicker {

      0%,
      100% {
        opacity: 1;
      }

      92% {
        opacity: 1;
      }

      93% {
        opacity: 0.6;
      }

      94% {
        opacity: 1;
      }

      96% {
        opacity: 0.4;
      }

      97% {
        opacity: 1;
      }
    }

    @keyframes boot-flicker {

      0%,
      100% {
        opacity: 0.08;
      }

      35% {
        opacity: 0.03;
      }

      42% {
        opacity: 0.14;
      }

      68% {
        opacity: 0.04;
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes spin-slow {
      from {
        transform: rotateY(0deg);
      }

      to {
        transform: rotateY(360deg);
      }
    }

    @keyframes hex-rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes scan-h {
      0% {
        transform: translateX(-150%);
      }

      100% {
        transform: translateX(150%);
      }
    }

    @keyframes sound-wave {

      0%,
      100% {
        height: 15%;
      }

      50% {
        height: 100%;
      }
    }

    @keyframes cursor-blink {

      0%,
      49% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0;
      }
    }

    /* ── Utility classes ── */
    .font-mono {
      font-family: 'JetBrains Mono', monospace !important;
    }

    .font-display {
      font-family: 'Space Grotesk', sans-serif !important;
    }

    .text-flicker {
      animation: text-flicker 4s linear infinite;
    }

    .boot-flicker {
      background: radial-gradient(circle at 50% 0%, rgba(0, 255, 157, 0.09), transparent 60%);
      animation: boot-flicker 320ms steps(3, end) infinite;
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    .sound-bar {
      animation: sound-wave 1s ease-in-out infinite;
    }

    .cursor-blink {
      animation: cursor-blink 1s step-end infinite;
    }

    .scan-h {
      animation: scan-h 2.5s linear infinite;
    }

    .hex-rotate {
      animation: hex-rotate 8s linear infinite;
    }

    /* ── Custom selection ── */
    ::selection {
      background: rgba(0, 255, 157, 0.3);
      color: #fff;
    }

    /* ── No scrollbar utility ── */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* ── Glass panel ── */
    .glass {
      background: var(--glass-mid);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
    }

    .glass-low {
      background: var(--glass-low);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ── Glow border ── */
    .border-glow {
      box-shadow: 0 0 0 1px rgba(0, 255, 157, 0.4),
        0 0 20px rgba(0, 255, 157, 0.12),
        inset 0 0 20px rgba(0, 255, 157, 0.04);
    }

    .border-glow-active {
      box-shadow: 0 0 0 1px rgba(0, 255, 157, 0.7),
        0 0 30px rgba(0, 255, 157, 0.25),
        inset 0 0 30px rgba(0, 255, 157, 0.07);
    }

    /* ── 3D perspective wrapper ── */
    .perspective-1000 {
      perspective: 1000px;
    }
  </style>

  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.jsx"></script>
</body>

</html>
